name: android-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Decode keystore + write key.properties
        working-directory: app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/reps-release.jks
          cat > key.properties <<EOF
          storeFile=reps-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Verify pubspec version matches tag
        working-directory: app
        run: |
          TAG="${GITHUB_REF_NAME}"; WANT="${TAG#v}"
          GOT=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          if [ "$GOT" != "$WANT" ]; then
            echo "::error::pubspec version '$GOT' does not match tag '$WANT'"; exit 1
          fi
          echo "pubspec version $GOT matches tag $WANT"

      - name: Build signed release APK
        working-directory: app
        run: |
          flutter pub get
          TAG="${GITHUB_REF_NAME}"
          flutter build apk --release \
            --build-name="${TAG#v}" \
            --build-number="${{ github.run_number }}"

      - name: Stage the artifact
        run: cp app/build/app/outputs/flutter-apk/app-release.apk "reps-${GITHUB_REF_NAME}.apk"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: reps-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
