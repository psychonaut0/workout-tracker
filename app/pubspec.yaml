name: workout_tracker
description: Workout tracker Flutter client (local-first via PowerSync).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  # Local-first sync engine. v2 bundles SQLite via build hooks, so no separate
  # powersync_flutter_libs is needed (works on Linux desktop out of the box).
  powersync: ^2.2.0
  # ResultSet type for db.watch() streams. Transitive via powersync, declared
  # direct because home_screen imports package:sqlite3/common.dart.
  sqlite3: ^3.3.2
  # SqliteWriteContext for PowerSyncTxExecutor in session_writer.dart.
  # Transitive via powersync; declared direct to satisfy depend_on_referenced_packages.
  sqlite_async: ^0.14.2
  # Token storage.
  flutter_secure_storage: ^9.2.2
  # HTTP to the Go API (login / refresh / powersync-token / sync upload).
  http: ^1.2.2
  # App-support dir for the local DB file.
  path_provider: ^2.1.4
  path: ^1.9.0
  # Google Fonts for Space Grotesk / Hanken Grotesk / JetBrains Mono.
  google_fonts: ^6.2.1
  # Reactive state management (UnitService, ActiveSessionController).
  provider: ^6.1.2
  # Client-local settings persistence (unit, theme, accent, serverUrl).
  shared_preferences: ^2.3.2
  # Export delivery: opens the Android share sheet with the JSON file.
  share_plus: ^11.0.0
  # Ongoing workout notification (Android): chronometer elapsed / rest countdown.
  flutter_local_notifications: ^21.0.0
  # OS-alarm scheduling for the rest-end notification revert (transitive via
  # flutter_local_notifications; declared direct since we import tz/data).
  timezone: ^0.11.0
  # Deterministic v5 ids for the template-absorb migration.
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Generates the Android launcher icon (incl. adaptive) from assets/icon/.
  # Config: flutter_launcher_icons.yaml; sources prepared in docs/flutter_icons/.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
